name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build all targets
        run: |
          GOOS=windows GOARCH=amd64 go build -o backup-windows-amd64.exe ./cmd/backup
          GOOS=darwin  GOARCH=arm64 go build -o backup-darwin-arm64    ./cmd/backup
          GOOS=linux   GOARCH=amd64 go build -o backup-linux-amd64     ./cmd/backup
          GOOS=linux   GOARCH=arm64 go build -o backup-linux-arm64     ./cmd/backup

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            backup-windows-amd64.exe
            backup-darwin-arm64
            backup-linux-amd64
            backup-linux-arm64
